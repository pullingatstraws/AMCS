<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AMCS · Ocean Data Visualiser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=gambetta@400,401,500,501&display=swap">
<style>
:root{
  --lagoon:#006673;
  --lagoon-deep:#004f59;
  --coral:#FBECDE;
  --eyre:#1D1D20;
  --bondi:#D29C81;
  --ember:#D4502A;
  --kelp:#2A7255;
  --serif:'Gambetta','Source Serif 4',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--sans);background:var(--eyre);color:var(--coral)}

.app{display:grid;grid-template-columns:320px 1fr;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{
  background:var(--eyre);
  border-right:1px solid rgba(251,236,222,0.14);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-header{
  padding:26px 24px 20px;
  border-bottom:1px solid rgba(251,236,222,0.14);
  flex-shrink:0;
}
.brand-row{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.brand-row .mark{width:26px;height:auto;flex-shrink:0}
.brand-row .mark path{fill:var(--coral);opacity:0.9}
.sidebar-header h1{
  font-family:var(--sans);
  font-size:10px;
  font-weight:500;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--coral);
  opacity:0.5;
}
.sidebar-header h2{
  font-family:var(--serif);
  font-size:22px;
  font-weight:400;
  font-style:italic;
  color:var(--coral);
  letter-spacing:0.002em;
  line-height:1.15;
}
.coords-readout{
  margin-top:14px;
  font-family:var(--sans);
  font-size:10px;
  letter-spacing:0.1em;
  color:var(--coral);
  opacity:0.4;
  font-variant-numeric:tabular-nums;
}
.sidebar-scroll{
  flex:1;overflow-y:auto;padding:0 24px 24px;
}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-track{background:transparent}
.sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(251,236,222,0.2)}

.section{
  padding:20px 0;
  border-bottom:1px solid rgba(251,236,222,0.08);
}
.section:last-child{border-bottom:none}
.section-label{
  font-family:var(--sans);
  font-size:9px;
  font-weight:500;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--coral);
  opacity:0.42;
  margin-bottom:14px;
}

/* Controls */
select,input[type="text"]{
  width:100%;
  padding:9px 10px;
  background:rgba(251,236,222,0.05);
  border:1px solid rgba(251,236,222,0.18);
  color:var(--coral);
  font-family:var(--sans);
  font-size:12px;
  border-radius:0;
  outline:none;
  margin-bottom:7px;
  -webkit-appearance:none;
}
select:focus,input[type="text"]:focus{
  border-color:rgba(251,236,222,0.4);
}
select option{background:var(--eyre)}

.custom-coords{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.custom-coords input::placeholder{color:var(--coral);opacity:0.35;font-family:var(--sans)}

.btn{
  width:100%;padding:10px 12px;
  background:transparent;
  border:1px solid rgba(251,236,222,0.22);
  color:var(--coral);
  font-family:var(--sans);
  font-size:10.5px;
  font-weight:500;
  letter-spacing:0.08em;
  text-transform:uppercase;
  border-radius:0;
  cursor:pointer;
  transition:background 0.15s,border-color 0.15s;
  margin-bottom:7px;
}
.btn:hover{background:rgba(251,236,222,0.08);border-color:rgba(251,236,222,0.4)}
.btn:active{background:rgba(251,236,222,0.14)}
.btn-primary{
  background:var(--lagoon);
  border-color:var(--lagoon);
  color:var(--coral);
}
.btn-primary:hover{background:var(--lagoon-deep);border-color:var(--lagoon-deep)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}

/* Range sliders */
.slider-group{margin-bottom:2px}
.slider-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:-2px}
.slider-row label{font-family:var(--sans);font-size:11px;color:var(--coral);opacity:0.72}
.slider-row span{font-family:var(--sans);font-size:10px;color:var(--coral);opacity:0.42;font-variant-numeric:tabular-nums;min-width:32px;text-align:right}
input[type="range"]{
  width:100%;
  -webkit-appearance:none;
  appearance:none;
  height:20px;              /* tall invisible hit area, visual track stays thin */
  padding:0;
  background:transparent;
  border-radius:0;
  outline:none;
  cursor:pointer;
  touch-action:pan-y;       /* vertical page scroll still works; thumb only tracks horizontal drag */
  -webkit-tap-highlight-color:transparent;
}
/* thin visual track, decoupled from the taller hit area above */
input[type="range"]::-webkit-slider-runnable-track{
  height:2px;
  background:rgba(251,236,222,0.2);
  border-radius:1px;
}
input[type="range"]::-moz-range-track{
  height:2px;
  background:rgba(251,236,222,0.2);
  border-radius:1px;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:13px;height:13px;
  background:var(--coral);
  border-radius:50%;
  margin-top:-5.5px;
  box-shadow:0 0 0 0 rgba(251,236,222,0);
  transition:transform 0.12s ease,box-shadow 0.12s ease;
}
input[type="range"]::-moz-range-thumb{
  width:13px;height:13px;
  background:var(--coral);
  border:none;border-radius:50%;
  box-shadow:0 0 0 0 rgba(251,236,222,0);
  transition:transform 0.12s ease,box-shadow 0.12s ease;
}
input[type="range"]:hover::-webkit-slider-thumb{transform:scale(1.15)}
input[type="range"]:hover::-moz-range-thumb{transform:scale(1.15)}
input[type="range"].dragging::-webkit-slider-thumb,
input[type="range"]:active::-webkit-slider-thumb{
  transform:scale(1.3);
  box-shadow:0 0 0 6px rgba(251,236,222,0.12);
}
input[type="range"].dragging::-moz-range-thumb,
input[type="range"]:active::-moz-range-thumb{
  transform:scale(1.3);
  box-shadow:0 0 0 6px rgba(251,236,222,0.12);
}
/* prevents text-selection flicker across the sidebar while a thumb is being dragged */
body.slider-dragging{user-select:none;-webkit-user-select:none}

/* Seed display */
.seed-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;
  background:rgba(251,236,222,0.04);
  border:1px solid rgba(251,236,222,0.12);
  border-radius:0;
  margin-bottom:9px;
}
.seed-row .seed-label{font-family:var(--sans);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.42}
.seed-row .seed-val{font-family:var(--sans);font-size:11px;font-variant-numeric:tabular-nums;opacity:0.7}

/* Status */
.status{
  font-family:var(--sans);
  font-size:10px;
  line-height:1.8;
  letter-spacing:0.02em;
  opacity:0.48;
  padding:9px 10px;
  background:rgba(251,236,222,0.03);
  border-left:1px solid rgba(251,236,222,0.15);
}
.status.live{opacity:0.7}
.status .dot{
  display:inline-block;width:5px;height:5px;
  border-radius:50%;background:var(--kelp);
  margin-right:5px;vertical-align:middle;
}
.status .dot.fallback{background:var(--bondi)}

.warn{
  font-family:var(--sans);
  font-size:10px;padding:8px 10px;
  background:rgba(212,80,42,0.14);
  border:1px solid rgba(212,80,42,0.3);
  border-radius:0;color:var(--ember);
  margin-bottom:9px;display:none;
  letter-spacing:0.02em;
}

/* Viewport */
.viewport{position:relative;overflow:hidden;background:var(--lagoon)}
canvas{display:block;width:100%;height:100%}

.viewport-overlay{
  position:absolute;top:16px;right:16px;
  display:flex;gap:8px;
}
.overlay-btn{
  padding:6px 12px;
  background:rgba(29,29,32,0.6);
  border:1px solid rgba(251,236,222,0.2);
  color:var(--coral);
  font-size:10px;letter-spacing:0.08em;
  border-radius:3px;cursor:pointer;
  backdrop-filter:blur(8px);
  transition:background 0.15s;
}
.overlay-btn:hover{background:rgba(29,29,32,0.85)}

.loading{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,102,115,0.7);
  font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--coral);opacity:0;
  pointer-events:none;
  transition:opacity 0.2s;
}
.loading.active{opacity:1;pointer-events:all}

/* Field character — editorial signature panel */
#mood{
  font-family:var(--sans);
  font-size:10px;
  line-height:1.9;
  letter-spacing:0.02em;
  opacity:0.55;
  padding:14px 0 2px;
  border-top:1px solid rgba(251,236,222,0.1);
}
#mood strong{
  display:block;
  font-family:var(--serif);
  font-style:italic;
  font-weight:400;
  font-size:19px;
  letter-spacing:0.002em;
  line-height:1.3;
  opacity:1;
  margin-bottom:10px;
}

/* Viewport chrome */
.viewport-overlay{
  font-family:var(--sans);
}
.overlay-btn{
  border-radius:0;
  font-weight:500;
  letter-spacing:0.09em;
}
.loading{
  font-family:var(--serif);
  font-style:italic;
  font-weight:400;
  text-transform:none;
  letter-spacing:0.01em;
  font-size:16px;
}

.viewport-coords{
  position:absolute;bottom:16px;right:18px;
  font-family:var(--sans);
  font-size:10px;
  letter-spacing:0.1em;
  color:var(--coral);
  opacity:0.55;
  text-align:right;
  font-variant-numeric:tabular-nums;
  pointer-events:none;
  text-shadow:0 1px 6px rgba(0,0,0,0.35);
}
.viewport-caption{
  position:absolute;bottom:16px;left:18px;
  font-family:var(--serif);
  font-style:italic;
  font-size:13px;
  color:var(--coral);
  opacity:0.75;
  pointer-events:none;
  text-shadow:0 1px 6px rgba(0,0,0,0.35);
}

@media (max-width:720px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidebar{border-right:none;border-bottom:1px solid rgba(251,236,222,0.14);max-height:46vh}
  .viewport-caption{display:none}
}
</style>
</head>

<script>
// ─────────────────────────────────────────────
// PALETTE
// ─────────────────────────────────────────────
const PALETTE = {

};

// ─────────────────────────────────────────────
// LOCATIONS
// Each entry: [label, lat, lon]
// ─────────────────────────────────────────────
const LOCATIONS = [
  ['Sydney Shelf — EAC Core',       -33.85,  151.30],
  ['Eden Shelf — EAC Separation',   -37.06,  149.95],
  ['Lord Howe Rise',                -31.50,  159.20],

  ['Coral Sea Plateau',             -18.50,  154.00],
  ['Ningaloo Coast — Leeuwin',      -22.75,  113.75],
  ['Cape Leeuwin — Leeuwin/AAC',    -34.40,  115.10],
  ['Fremantle Shelf',               -32.05,  115.30],
  ['Indonesian Throughflow — Timor', -10.00, 124.00],
  ['Banda Sea',                      -5.00,  128.00],
  ['Antarctic Circumpolar — South',  -54.00, 130.00],
  ['Heard Island',                   -53.10,  73.50],
  ['Flinders Current — GAB',         -33.50,  130.00],
  ['Spencer Gulf',                   -34.50,  137.00],
  ['Torres Strait',                  -10.50,  142.20],
  ['Tasman Sea Centre',              -40.00,  160.00],
];

const FALLBACK = {
  currentVelocity: 0.35,
  currentDirection: 22,
  waveHeight: 1.2,
  waveDirection: 48,
  wavePeriod: 8,
  swellDirection: 60
};

// ─────────────────────────────────────────────
// STATE & GEOMETRY CACHE
// ─────────────────────────────────────────────
let seed       = Math.floor(Math.random() * 1e7);
let currentLoc = LOCATIONS[0];
let marine     = { ...FALLBACK };
let influence  = 0;
let svgPaths   = [];
let flowZones  = [];
let bgIsLagoon = true;
let cachedPaths = []; // System-wide coordinate cache for high FPS animation
let zoomLevel = 1;
const zoomLevels = [1,2,4,'drift'];

const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const viewport = document.getElementById('viewport');
const locationSelect = document.getElementById('location');

// ─────────────────────────────────────────────
// POPULATE LOCATION DROPDOWN
// ─────────────────────────────────────────────
LOCATIONS.forEach((l, i) => {
  const o = document.createElement('option');
  o.value = i; o.textContent = l[0];
  locationSelect.appendChild(o);
});

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
function resize() {
  canvas.width  = viewport.clientWidth;
  canvas.height = viewport.clientHeight;
  generateFlowZones();
  generatePaths(); // Geometry generation separated from render loop
  render();
}
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────
// DETERMINISTIC HASH NOISE (seeded)
// ─────────────────────────────────────────────
function rand(n) {
  const x = Math.sin(n) * 43758.5453;
  return x - Math.floor(x);
}

// Value noise with smooth interpolation
function noise(x, y) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x - xi, yf = y - yi;
  const a = rand(xi * 127 + yi * 311 + seed);
  const b = rand((xi + 1) * 127 + yi * 311 + seed);
  const c = rand(xi * 127 + (yi + 1) * 311 + seed);
  const d = rand((xi + 1) * 127 + (yi + 1) * 311 + seed);
  const ux = xf * xf * (3 - 2 * xf);
  const uy = yf * yf * (3 - 2 * yf);
  return ((a * (1 - ux) + b * ux) * (1 - uy)) + ((c * (1 - ux) + d * ux) * uy);
}

// Multi-octave noise for richer field structure
function fbm(x, y, octaves = 3) {
  let v = 0, amp = 0.5, freq = 1, total = 0;
  for (let o = 0; o < octaves; o++) {
    v     += noise(x * freq, y * freq) * amp;
    total += amp;
    amp   *= 0.5;
    freq  *= 2.1;
  }
  return v / total;
}

// ─────────────────────────────────────────────
// FLOW ZONE GENERATION
// ─────────────────────────────────────────────

function generateFlowZones() {
  flowZones = [];

  let angleDiff = Math.abs(marine.currentDirection - marine.waveDirection) % 180;
  if (angleDiff > 90) angleDiff = 180 - angleDiff;

  const shear = angleDiff / 90;
  const turbulence = Math.min((marine.currentVelocity * marine.waveHeight) / 1.5, 2);

  const sliderCount     = parseInt(document.getElementById('zoneCount').value);
  const sliderIntensity = parseInt(document.getElementById('zoneIntensity').value) / 100;

  const derivedCount = Math.max(1, Math.round((shear * 4) + (turbulence * 3)));
  const count = Math.min(sliderCount, derivedCount + Math.floor(sliderCount * 0.5));

  for (let i = 0; i < count; i++) {
    const x = ((i + 1) / (count + 1)) * canvas.width;
    const y = (0.2 + (rand(seed + i * 71) * 0.6)) * canvas.height;

    const radius =
      parseInt(document.getElementById('zoneRadius').value) *
      (0.7 + turbulence * 0.4);

    const swellDelta =
      Math.abs(marine.swellDirection - marine.waveDirection) % 180;

    const offset =
      (shear * 45) +
      (swellDelta * 0.25) *
      (i % 2 === 0 ? 1 : -1);

    const strength =
      Math.min(1, (shear + turbulence) * 0.5) *
      sliderIntensity;

    flowZones.push({ x, y, radius, offset, strength });
  }
}


// ─────────────────────────────────────────────
// VECTOR FIELD
// ─────────────────────────────────────────────
function field(x, y) {
  const smoothing = parseInt(document.getElementById('smooth').value) / 100;

  const periodNorm = Math.max(0, Math.min(1, (marine.wavePeriod - 4) / 11));
  const velocityNorm = Math.min(marine.currentVelocity / 1.5, 1);

  const scale = 0.012 - periodNorm * 0.009;
  const coherence = 0.25 + velocityNorm * 0.75;

  const base = marine.currentDirection * Math.PI / 180;
  const wave = marine.waveDirection * Math.PI / 180;

  const angleDiff = Math.abs(marine.currentDirection - marine.waveDirection) % 180;
  const shear = Math.min(angleDiff, 180 - angleDiff) / 90;

  const noiseAmt =
    (0.65 - coherence * 0.45) *
    (1.2 - periodNorm * 0.5) *
    (1 + shear * 0.5);

  let angle =
    base * 0.70 +
    wave * 0.30 +
    (fbm(x * scale, y * scale) - 0.5) * noiseAmt;

  for (const zone of flowZones) {
    const dx   = x - zone.x;
    const dy   = y - zone.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < zone.radius && dist > 1) {
      const t          = dist / zone.radius;
      const influence  = Math.exp(-t * t * 2.5) * zone.strength;
      const secondary  = angle + (zone.offset * Math.PI / 180);
      angle            = angle * (1 - influence) + secondary * influence;
    }
  }

  return { x: Math.cos(angle), y: Math.sin(angle) * 0.52 };
}

// ─────────────────────────────────────────────
// RK4 INTEGRATION
// ─────────────────────────────────────────────
function rk4(x, y, h) {
  const k1 = field(x, y);
  const k2 = field(x + k1.x * h / 2, y + k1.y * h / 2);
  const k3 = field(x + k2.x * h / 2, y + k2.y * h / 2);
  const k4 = field(x + k3.x * h,     y + k3.y * h);
  return [
    x + h * (k1.x + 2 * k2.x + 2 * k3.x + k4.x) / 6,
    y + h * (k1.y + 2 * k2.y + 2 * k3.y + k4.y) / 6
  ];
}

// ─────────────────────────────────────────────
// STRATIFIED GRID SEEDING
// ─────────────────────────────────────────────
function buildSeedGrid(count) {
  const aspect = canvas.width / canvas.height;
  const cols   = Math.round(Math.sqrt(count * aspect));
  const rows   = Math.round(count / cols);
  const cw     = canvas.width  / cols;
  const ch     = canvas.height / rows;
  const pts    = [];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = r * cols + c;
      const jx  = rand(seed + idx * 13 + 1) * cw;
      const jy  = rand(seed + idx * 29 + 2) * ch;
      pts.push([c * cw + jx, r * ch + jy]);
    }
  }
  return pts;
}

// ─────────────────────────────────────────────
// SMOOTH SVG PATH
// ─────────────────────────────────────────────
function ptsToBezier(pts) {
  if (pts.length < 2) return '';
  let d = `M ${pts[0][0].toFixed(2)} ${pts[0][1].toFixed(2)}`;
  for (let i = 1; i < pts.length - 1; i++) {
    const mx = (pts[i][0] + pts[i + 1][0]) / 2;
    const my = (pts[i][1] + pts[i + 1][1]) / 2;
    d += ` Q ${pts[i][0].toFixed(2)} ${pts[i][1].toFixed(2)} ${mx.toFixed(2)} ${my.toFixed(2)}`;
  }
  const last = pts[pts.length - 1];
  d += ` L ${last[0].toFixed(2)} ${last[1].toFixed(2)}`;
  return d;
}

// ─────────────────────────────────────────────
// GEOMETRY GENERATOR (Isolates field math)
// ─────────────────────────────────────────────
function generatePaths() {
  cachedPaths = [];
  svgPaths = []; // stale until buildSvgPaths() runs — regenerated lazily, only when exporting
  if (!canvas.width) return;

  const count   = parseInt(document.getElementById('density').value);
  const maxSteps = Math.floor(parseInt(document.getElementById('length').value) * (0.7 + Math.min(marine.currentVelocity,1.5)*0.6));
  const seeds   = buildSeedGrid(count);

  for (const [sx, sy] of seeds) {
    let x = sx, y = sy;
    const pts = [[x, y]];

    for (let s = 0; s < maxSteps; s++) {
      [x, y] = rk4(x, y, 2);
      if (x < -10 || y < -10 || x > canvas.width + 10 || y > canvas.height + 10) break;
      pts.push([x, y]);
    }

    if (pts.length < 6) continue;

    cachedPaths.push({
      pts,
      phase: rand(seed + sx * 17 + sy * 31) * Math.PI * 2
    });
    // NOTE: bezier string-building (ptsToBezier) used to run here on every
    // path, on every slider tick — that's the expensive part sliders don't
    // need while scrubbing. It's now deferred to buildSvgPaths(), which only
    // runs once, on demand, right before export.
  }
}

// Builds the exportable SVG path strings from the already-computed
// coordinate cache. Only called when the user actually exports, so dragging
// density/length/smoothing never pays this cost.
function buildSvgPaths() {
  svgPaths = cachedPaths.map(p => ptsToBezier(p.pts));
}

// ─────────────────────────────────────────────
// DRAWING STEP
// ─────────────────────────────────────────────
function drawAnimatedPath(pathObj, time) {
  const pts = pathObj.pts;
  const speedMultiplier = parseInt(document.getElementById('motionSpeed')?.value || 100) / 100;
  const speed = (0.05 + marine.currentVelocity * 0.25) * speedMultiplier;
  const energy = marine.currentVelocity * marine.waveHeight;
  const frequency = 1 + energy * 0.6;

  const pulse = (Math.sin(time * speed * frequency + pathObj.phase) * 0.5 + 0.5);
  const visibleLength = 0.12 + pulse * (0.45 + Math.min(marine.currentVelocity,1.2) * 0.25);
  const maxIndex = Math.max(2, Math.floor((pts.length - 1) * visibleLength));

  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);

  for (let i = 1; i < maxIndex; i++) {
    ctx.lineTo(pts[i][0], pts[i][1]);
  }
  ctx.stroke();
}

// ─────────────────────────────────────────────
// RENDER (Runs every frame—pure lightweight drawing)
// ─────────────────────────────────────────────
function render() {
  if (!canvas.width) return;

  const bg     = bgIsLagoon ? PALETTE.lagoon : PALETTE.coral;
  const stroke = bgIsLagoon ? PALETTE.coral  : PALETTE.lagoon;

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const driftMode = zoomLevel === 'drift';
  const z = driftMode ? 2.5 : zoomLevel;

  ctx.save();

  let cameraX = 0;
  let cameraY = 0;

  if(driftMode){
    const tt = performance.now()*0.001;
    cameraX = Math.sin(tt*0.05)*120;
    cameraY = Math.cos(tt*0.04)*90;
  }

  ctx.translate(canvas.width/2, canvas.height/2);
  ctx.scale(z,z);
  ctx.translate(-canvas.width/2 + cameraX, -canvas.height/2 + cameraY);

  ctx.strokeStyle   = stroke;
  ctx.lineWidth     = document.getElementById('weight').value / 10;
  ctx.globalAlpha   = document.getElementById('opacity').value / 100;
  ctx.lineCap       = 'round';
  ctx.lineJoin      = 'round';

  const t = performance.now() * 0.001;
  for (const path of cachedPaths) {
    drawAnimatedPath(path, t);
  }

  ctx.restore();
  ctx.globalAlpha = 1;
  updateMood();
  updateSliderLabels();
}

// ─────────────────────────────────────────────
// UI UPDATES
// ─────────────────────────────────────────────

function updateMood() {
  let angleDiff = Math.abs(marine.currentDirection - marine.waveDirection) % 180;
  if (angleDiff > 90) angleDiff = 180 - angleDiff;

  const energy = marine.currentVelocity * marine.waveHeight;
  const swellDelta = Math.abs(marine.swellDirection - marine.waveDirection) % 180;

  const flowType =
    angleDiff < 15 ? 'Aligned Flow' :
    angleDiff < 35 ? 'Drift Flow' :
    angleDiff < 60 ? 'Sheared Flow' :
    'Cross-current Flow';

  const energyState =
    energy < 0.3 ? 'Low Energy' :
    energy < 0.8 ? 'Moderate Energy' :
    energy < 1.5 ? 'Active' :
    'High Energy';

  const structure =
    swellDelta < 20 ? 'Coherent' :
    swellDelta < 45 ? 'Layered' :
    swellDelta < 70 ? 'Braided' :
    'Rotational';

  const signatureMap = {
    'Aligned Flow|Coherent':'Coastal Conveyor Field',
    'Drift Flow|Layered':'Shelf Drift Field',
    'Sheared Flow|Braided':'Tasman Shear Field',
    'Cross-current Flow|Rotational':'Rotational Boundary Field'
  };
  const signature = signatureMap[flowType + '|' + structure] || `${flowType.split(' ')[0]} ${structure} Field`;

  document.getElementById('mood').innerHTML =
    `<strong>${signature}</strong><br>` +
    `Flow Type: ${flowType}<br>` +
    `Energy: ${energyState}<br>` +
    `Structure: ${structure}<br>` +
    `Data Influence: ${Math.round(influence * 100)}%`;
}


function updateStatus(source, live) {
  const dot = live ? '<span class="dot"></span>' : '<span class="dot fallback"></span>';
  document.getElementById('status').className = 'status' + (live ? ' live' : '');
  document.getElementById('status').innerHTML =
    `${dot}${source}<br>` +
    `API influence: ${Math.round(influence * 100)}%`;
}

function updateSliderLabels() {
  document.getElementById('densityVal').textContent  = document.getElementById('density').value;
  document.getElementById('lengthVal').textContent   = document.getElementById('length').value;
  document.getElementById('weightVal').textContent   = (document.getElementById('weight').value / 10).toFixed(2) + 'px';
  document.getElementById('opacityVal').textContent  = document.getElementById('opacity').value + '%';
  document.getElementById('zoneCountVal').textContent = document.getElementById('zoneCount').value;
  document.getElementById('zoneIntVal').textContent  = document.getElementById('zoneIntensity').value + '%';
  document.getElementById('zoneRadVal').textContent  = document.getElementById('zoneRadius').value;
  document.getElementById('smoothVal').textContent   = document.getElementById('smooth').value + '%';
  const ms = document.getElementById('motionSpeed');
  if (ms) document.getElementById('motionSpeedVal').textContent = (ms.value / 100).toFixed(1) + '×';
}

// ─────────────────────────────────────────────
// COORDINATE READOUT — mirrors the print system's
// bottom-corner geo-tag convention
// ─────────────────────────────────────────────
function formatCoord(lat, lon) {
  const ns = lat >= 0 ? 'N' : 'S';
  const ew = lon >= 0 ? 'E' : 'W';
  return `${Math.abs(lat).toFixed(4)}° ${ns}   ${Math.abs(lon).toFixed(4)}° ${ew}`;
}

function updateCoords(lat, lon, label) {
  const txt = formatCoord(lat, lon);
  document.getElementById('coordsReadout').textContent = txt;
  document.getElementById('viewportCoords').textContent = txt;
  if (label) document.getElementById('viewportCaption').textContent = label;
}

// ─────────────────────────────────────────────
// DATA FETCH — Open-Meteo Marine API
// ─────────────────────────────────────────────
async function fetchMarine(lat, lon) {
  updateCoords(lat, lon, currentLoc[0]);
  document.getElementById('loading').classList.add('active');
  try {
    const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}` +
      `&hourly=wave_height,wave_direction,wave_period,ocean_current_velocity,` +
      `ocean_current_direction,swell_wave_direction`;

    const data = await fetch(url).then(r => r.json());
    const h = data.hourly || {};
    const i = Math.max((h.time?.length || 1) - 1, 0);

    let score = 0;
    ['wave_height','wave_direction','wave_period',
     'ocean_current_velocity','ocean_current_direction','swell_wave_direction'
    ].forEach(k => { if (Array.isArray(h[k])) score++; });
    influence = score / 6;

    marine = {
      currentVelocity:  h.ocean_current_velocity ?.[i] ?? FALLBACK.currentVelocity,
      currentDirection: h.ocean_current_direction?.[i] ?? FALLBACK.currentDirection,
      waveHeight:       h.wave_height            ?.[i] ?? FALLBACK.waveHeight,
      waveDirection:    h.wave_direction         ?.[i] ?? FALLBACK.waveDirection,
      wavePeriod:       h.wave_period            ?.[i] ?? FALLBACK.wavePeriod,
      swellDirection:   h.swell_wave_direction   ?.[i] ?? FALLBACK.swellDirection
    };

    document.getElementById('warn').style.display = 'none';
    updateStatus('Live data · Open-Meteo Marine', true);

  } catch(e) {
    marine = { ...FALLBACK };
    influence = 0;
    document.getElementById('warn').style.display = 'block';
    updateStatus('Procedural fallback', false);
  }

  generateFlowZones();
  generatePaths();
  render();
  document.getElementById('loading').classList.remove('active');
}

// ─────────────────────────────────────────────
// EVENT WIRING
// ─────────────────────────────────────────────
document.getElementById('seedLabel').textContent = seed;

document.getElementById('randomSeed').onclick = () => {
  seed = Math.floor(Math.random() * 1e7);
  document.getElementById('seedLabel').textContent = seed;
  generateFlowZones();
  generatePaths();
  render();
};

document.getElementById('randomOcean').onclick = () => {
  const i = Math.floor(Math.random() * LOCATIONS.length);
  currentLoc = LOCATIONS[i];
  locationSelect.value = i;
  fetchMarine(currentLoc[1], currentLoc[2]);
};

document.getElementById('refresh').onclick = () =>
  fetchMarine(currentLoc[1], currentLoc[2]);

locationSelect.onchange = () => {
  currentLoc = LOCATIONS[+locationSelect.value];
  fetchMarine(currentLoc[1], currentLoc[2]);
};

document.getElementById('customBtn').onclick = () => {
  const lat = parseFloat(document.getElementById('lat').value);
  const lon = parseFloat(document.getElementById('lon').value);
  if (!isNaN(lat) && !isNaN(lon)) {
    currentLoc = [`${lat.toFixed(2)}, ${lon.toFixed(2)}`, lat, lon];
    fetchMarine(lat, lon);
  }
};


document.getElementById('zoomBtn').onclick = () => {
  let idx = zoomLevels.indexOf(zoomLevel);
  idx = (idx + 1) % zoomLevels.length;
  zoomLevel = zoomLevels[idx];
  document.getElementById('zoomBtn').textContent =
    zoomLevel === 'drift' ? 'Zoom: Drift' : `Zoom: ${zoomLevel}×`;
  render();
};

document.getElementById('toggleBg').onclick = () => {
  bgIsLagoon = !bgIsLagoon;
  render();
};

// ─────────────────────────────────────────────
// SLIDER SMOOTHING
// A drag fires many 'input' events per second — far more than the screen can
// repaint. Without coalescing, each tick was synchronously re-running the
// flow-field simulation, so the browser fell behind and the thumb visibly
// stuttered under the finger/cursor. rafThrottle collapses any burst of
// ticks into a single recompute per animation frame, so the slider always
// stays perfectly attached to the pointer and heavy work happens at most
// 60×/sec, aligned with the frame the user actually sees.
// ─────────────────────────────────────────────
function rafThrottle(fn) {
  let queued = false;
  return () => {
    if (queued) return;
    queued = true;
    requestAnimationFrame(() => {
      queued = false;
      fn();
    });
  };
}

// Structural changes -> recalculate everything
const recalcZones = rafThrottle(() => {
  generateFlowZones();
  generatePaths();
  render();
});
['zoneCount','zoneIntensity','zoneRadius'].forEach(id => {
  document.getElementById(id).addEventListener('input', recalcZones);
});

const recalcPaths = rafThrottle(() => {
  generatePaths();
  render();
});
['density','length','smooth'].forEach(id => {
  document.getElementById(id).addEventListener('input', recalcPaths);
});

// Styling changes -> redraw vector coordinates instantly without complex calculations
// (render() already runs every frame in the animate loop below, so these just
// keep the on-screen value label in sync the instant the thumb moves)
['weight','opacity','motionSpeed'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateSliderLabels);
});

// ─────────────────────────────────────────────
// DRAG POLISH
// Bigger visual thumb + a body-level class while any slider is active, so
// text in the sidebar doesn't get accidentally selected mid-drag (common
// cause of "janky" feeling drags on trackpads) and touch drags on mobile
// feel deliberate rather than accidental.
// ─────────────────────────────────────────────
document.querySelectorAll('input[type="range"]').forEach(slider => {
  const start = () => {
    slider.classList.add('dragging');
    document.body.classList.add('slider-dragging');
  };
  const end = () => {
    slider.classList.remove('dragging');
    document.body.classList.remove('slider-dragging');
  };
  slider.addEventListener('pointerdown', start);
  slider.addEventListener('pointerup', end);
  slider.addEventListener('pointercancel', end);
  slider.addEventListener('touchstart', start, { passive: true });
  slider.addEventListener('touchend', end);
});

// ─────────────────────────────────────────────
// SVG EXPORT
// ─────────────────────────────────────────────
document.getElementById('exportBtn').onclick = () => {
  buildSvgPaths();
  const bg     = bgIsLagoon ? PALETTE.lagoon : PALETTE.coral;
  const stroke = bgIsLagoon ? PALETTE.coral  : PALETTE.lagoon;
  const w      = document.getElementById('weight').value / 10;
  const op     = document.getElementById('opacity').value / 100;
  const name   = (currentLoc[0] || 'custom').toLowerCase().replace(/[^a-z0-9]+/g, '-');

  const exportTimestamp = new Date().toISOString();

  const metadata = `
Location: ${currentLoc[0] || 'Custom'}
Timestamp: ${exportTimestamp}
Seed: ${seed}
Current Velocity: ${marine.currentVelocity}
Current Direction: ${marine.currentDirection}
Wave Height: ${marine.waveHeight}
Wave Direction: ${marine.waveDirection}
Wave Period: ${marine.wavePeriod}
Swell Direction: ${marine.swellDirection}
API Influence: ${Math.round(influence*100)}%
  `.trim();

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${canvas.width} ${canvas.height}">`;
  svg += `<metadata><![CDATA[${metadata}]]></metadata>`;
  svg += `<desc>${currentLoc[0] || 'Custom'} · ${exportTimestamp}</desc>`;
  svg += `<rect width="${canvas.width}" height="${canvas.height}" fill="${bg}"/>`;
  svgPaths.forEach(p => {
    svg += `<path d="${p}" fill="none" stroke="${stroke}" stroke-width="${w}" opacity="${op}" stroke-linecap="round" stroke-linejoin="round"/>`;
  });
  svg += `</svg>`;

  const a = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
  a.download = `amcs-texture-${name}-${seed}.svg`;
  a.click();
};

// ─────────────────────────────────────────────
// LOOP INIT
// ─────────────────────────────────────────────
function animate(){
  render();
  requestAnimationFrame(animate);
}

updateSliderLabels();
resize();
fetchMarine(currentLoc[1], currentLoc[2]);
requestAnimationFrame(animate);
</script>
</body>
</html>
